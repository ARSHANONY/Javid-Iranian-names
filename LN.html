<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>یادبود</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --text-main: #f0e6d2;
            --text-muted: #c2b59b;
            --accent-color: #8c7355;
            --accent-hover: #a68b6a;
            --bg-base: #26211d;
            --error-color: #ff6b6b;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Vazirmatn', system-ui, -apple-system, sans-serif;
            background-color: var(--bg-base);
            /* Aged dark parchment texture using SVG noise + radial gradient overlay */
            background-image: 
                radial-gradient(circle at center, rgba(0,0,0,0.2) 0%, rgba(0,0,0,0.7) 100%),
                url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.7' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.06'/%3E%3C/svg%3E");
            color: var(--text-main);
            height: 100vh;
            height: 100dvh;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* Full-screen snap scrolling feed */
        #feed {
            height: 100vh;
            height: 100dvh;
            overflow-y: scroll;
            scroll-snap-type: y mandatory;
            scroll-behavior: smooth;
            -ms-overflow-style: none; /* IE and Edge */
            scrollbar-width: none; /* Firefox */
        }
        
        #feed::-webkit-scrollbar {
            display: none; /* Chrome, Safari and Opera */
        }

        /* Individual slide */
        .slide {
            height: 100vh;
            height: 100dvh;
            width: 100%;
            scroll-snap-align: start;
            scroll-snap-stop: always;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 24px;
            position: relative;
        }

        /* Inner content container */
        .slide-content {
            width: 100%;
            max-width: 450px;
            display: flex;
            flex-direction: column;
            align-items: center;
            opacity: 0;
            transform: translateY(40px);
            transition: opacity 0.8s ease-out, transform 0.8s ease-out;
        }

        /* Animation class added by IntersectionObserver */
        .slide-content.visible {
            opacity: 1;
            transform: translateY(0);
        }

        /* Image styling */
        .img-wrapper {
            width: 100%;
            height: 55vh;
            max-height: 500px;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.6);
            margin-bottom: 28px;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            position: relative;
        }

        .img-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0;
            transition: opacity 0.6s ease-in;
        }

        .img-wrapper img.loaded {
            opacity: 1;
        }

        /* Placeholder loading animation */
        .img-wrapper::before {
            content: "";
            position: absolute;
            width: 40px;
            height: 40px;
            border: 3px solid rgba(255,255,255,0.1);
            border-top-color: var(--accent-color);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            z-index: -1;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Typography */
        .name {
            font-size: 2.2rem;
            font-weight: 700;
            margin: 0 0 12px 0;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.8);
            text-align: center;
            letter-spacing: -0.5px;
        }

        .details {
            font-size: 1.15rem;
            color: var(--text-muted);
            margin-bottom: 30px;
            text-align: center;
            line-height: 1.8;
            font-weight: 300;
        }

        .details span {
            display: block;
        }

        /* Button */
        .btn {
            display: inline-flex;
            justify-content: center;
            align-items: center;
            padding: 14px 32px;
            background-color: var(--accent-color);
            color: #fff;
            text-decoration: none;
            border-radius: 50px;
            font-size: 1.05rem;
            font-weight: 700;
            transition: all 0.3s ease;
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.1);
            cursor: pointer;
        }

        .btn:hover, .btn:active {
            background-color: var(--accent-hover);
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.5);
        }

        /* Status messages */
        .status-message {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 1.4rem;
            text-align: center;
            width: 90%;
            line-height: 1.6;
        }

        .error-text {
            color: var(--error-color);
        }

        .hidden {
            display: none !important;
        }

        /* Final slide / end of list */
        .end-mark {
            font-size: 1.2rem;
            color: var(--text-muted);
            opacity: 0.6;
        }
        
    </style>
</head>
<body>

    <div id="loading" class="status-message">
        در حال بارگذاری اطلاعات...
    </div>

    <div id="error" class="status-message error-text hidden"></div>

    <main id="feed" class="hidden"></main>

    <script>
        /**
         * CONFIGURATION
         * Replace these URLs with your actual raw GitHub URLs.
         */
        const DATA_URL = "https://raw.githubusercontent.com/USERNAME/REPO/main/data.json";
        const IMAGE_BASE_URL = "https://raw.githubusercontent.com/USERNAME/REPO/main/Photo/";

        // State variables
        let feedData = [];
        let currentIndex = 0;
        const BATCH_SIZE = 5;

        // DOM Elements
        const feedContainer = document.getElementById('feed');
        const loadingEl = document.getElementById('loading');
        const errorEl = document.getElementById('error');

        /**
         * INITIALIZATION
         */
        async function init() {
            try {
                const response = await fetch(DATA_URL);
                if (!response.ok) throw new Error("خطا در ارتباط با سرور");
                
                feedData = await response.json();
                
                if (!Array.isArray(feedData) || feedData.length === 0) {
                    throw new Error("اطلاعاتی برای نمایش یافت نشد");
                }

                loadingEl.classList.add('hidden');
                feedContainer.classList.remove('hidden');
                
                renderBatch();
            } catch (err) {
                loadingEl.classList.add('hidden');
                errorEl.textContent = "متاسفانه دریافت اطلاعات با مشکل مواجه شد. لطفا اتصال اینترنت خود را بررسی کنید.";
                errorEl.classList.remove('hidden');
                console.error("Fetch error:", err);
            }
        }

        /**
         * RENDER LOGIC
         */
        function renderBatch() {
            const end = Math.min(currentIndex + BATCH_SIZE, feedData.length);
            
            for (let i = currentIndex; i < end; i++) {
                const item = feedData[i];
                const slide = createSlideElement(item);
                feedContainer.appendChild(slide);
                
                // Observe for animations and lazy-loading
                contentObserver.observe(slide.querySelector('.slide-content'));
            }

            currentIndex = end;

            // Setup infinite scrolling trigger on the newly added last slide
            if (currentIndex < feedData.length) {
                const lastSlide = feedContainer.lastElementChild;
                infiniteScrollObserver.observe(lastSlide);
            } else {
                // Graceful end state
                const endSlide = document.createElement('div');
                endSlide.className = 'slide';
                endSlide.innerHTML = `
                    <div class="slide-content">
                        <div class="end-mark">پایان یادبود</div>
                    </div>
                `;
                feedContainer.appendChild(endSlide);
                contentObserver.observe(endSlide.querySelector('.slide-content'));
            }
        }

        function createSlideElement(item) {
            const slide = document.createElement('div');
            slide.className = 'slide';

            // Safely build details string
            let detailsHtml = '';
            if (item.age) detailsHtml += `<span>سن: ${item.age} سال</span>`;
            if (item.city) detailsHtml += `<span>شهر: ${item.city}</span>`;
            if (item.date) detailsHtml += `<span>تاریخ: ${item.date}</span>`;

            // Conditionally render button
            const buttonHtml = item.media_link 
                ? `<a href="${item.media_link}" target="_blank" rel="noopener noreferrer" class="btn" aria-label="مشاهده تصاویر و ویدیوهای ${item.name}">آخرین تصاویر و ویدیو</a>` 
                : '';

            slide.innerHTML = `
                <div class="slide-content">
                    <div class="img-wrapper">
                        <img alt="تصویر ${item.name}" data-photo="${item.photo || ''}">
                    </div>
                    <h2 class="name">${item.name || 'نامشخص'}</h2>
                    <div class="details">${detailsHtml}</div>
                    ${buttonHtml}
                </div>
            `;

            return slide;
        }

        /**
         * IMAGE LOADING & FALLBACK LOGIC
         */
        function loadImage(imgElement) {
            const photoName = imgElement.getAttribute('data-photo');
            
            if (!photoName) {
                applyPlaceholder(imgElement);
                return;
            }

            const jpgUrl = `${IMAGE_BASE_URL}${photoName}.jpg`;
            const pngUrl = `${IMAGE_BASE_URL}${photoName}.png`;

            // On success
            imgElement.onload = () => {
                imgElement.classList.add('loaded');
            };

            // On error cascade: JPG -> PNG -> Placeholder
            imgElement.onerror = () => {
                if (imgElement.src === jpgUrl) {
                    imgElement.src = pngUrl; // Try PNG
                } else if (imgElement.src === pngUrl) {
                    applyPlaceholder(imgElement); // Fallback to placeholder
                }
            };

            // Initiate loading with JPG
            imgElement.src = jpgUrl;
        }

        function applyPlaceholder(imgElement) {
            // SVG Data URI for a respectful empty state placeholder
            const svgPlaceholder = `data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="400" height="500" viewBox="0 0 400 500"><rect width="400" height="500" fill="%231a1614"/><text x="50%" y="50%" dominant-baseline="middle" text-anchor="middle" font-family="sans-serif" font-size="20" fill="%236e5e4a">تصویری یافت نشد</text></svg>`;
            imgElement.src = svgPlaceholder;
            imgElement.classList.add('loaded');
        }

        /**
         * INTERSECTION OBSERVERS
         */

        // 1. Observer for Animations and Lazy Loading Images
        const contentObserver = new IntersectionObserver((entries, observer) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    // Trigger fade-up animation
                    entry.target.classList.add('visible');
                    
                    // Trigger lazy load
                    const img = entry.target.querySelector('img');
                    if (img && !img.src) {
                        loadImage(img);
                    }
                    
                    // Optional: Unobserve after load to optimize performance
                    // If we want it to animate every time it comes into view, we don't unobserve.
                    // For reels, usually we just load once.
                    observer.unobserve(entry.target);
                }
            });
        }, {
            root: null,
            threshold: 0.15 // Trigger when 15% visible
        });

        // 2. Observer for Infinite Scrolling Pagination
        const infiniteScrollObserver = new IntersectionObserver((entries, observer) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    // Stop observing the current last slide
                    observer.unobserve(entry.target);
                    // Load more data
                    renderBatch();
                }
            });
        }, {
            root: null,
            rootMargin: '100px', // Trigger slightly before the user reaches the end
            threshold: 0.1
        });

        // Start execution
        document.addEventListener('DOMContentLoaded', init);

    </script>
</body>
</html>
