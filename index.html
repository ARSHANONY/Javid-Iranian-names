<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>یادمان</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-wrapper">

        <!-- MAIN SCROLL CONTAINER -->
        <main id="scroll-container" class="scroll-container hidden"></main>

        <!-- LOADER -->
        <div id="loader" class="state-container">
            <div class="spinner"></div>
            <p>در حال دریافت اطلاعات...</p>
        </div>

        <!-- ERROR -->
        <div id="error-message" class="state-container hidden">
            <svg class="error-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="12" cy="12" r="10"></circle>
                <line x1="12" y1="8" x2="12" y2="12"></line>
                <line x1="12" y1="16" x2="12.01" y2="16"></line>
            </svg>
            <p>متاسفانه در دریافت اطلاعات مشکلی رخ داد.</p>
            <button onclick="location.reload()" class="retry-btn">تلاش مجدد</button>
        </div>

        <!-- MENU BUTTON (سه خط با رنگ پرچم ایران) -->
        <div id="menu-button">
            <span class="bar green"></span>
            <span class="bar white"></span>
            <span class="bar red"></span>
        </div>

        <!-- MENU TABS -->
        <div id="menu-tabs" class="hidden">
            <button class="tab-btn" data-tab="home">خانه</button>
            <button class="tab-btn" data-tab="settings">تنظیمات</button>
            <button class="tab-btn" data-tab="description">توضیحات</button>
            <button class="tab-btn" data-tab="explore">اکسپلور تاریخ</button>
        </div>

        <!-- PAGES -->
        <div id="pages-container">
            <!-- HOME PAGE -->
            <section id="page-home" class="page active">
                <!-- بک‌گراند و محتوا همان scroll-container فعلی -->
            </section>

            <!-- SETTINGS PAGE -->
            <section id="page-settings" class="page hidden">
                <h2>تنظیمات</h2>
                <div class="settings-option">
                    <button id="toggle-music">موزیک خاموش</button>
                </div>
                <div class="settings-option">
                    <button id="toggle-scroll">اسکرول اتوماتیک خاموش</button>
                </div>
            </section>

            <!-- DESCRIPTION PAGE -->
            <section id="page-description" class="page hidden">
                <div class="description-box">
                    <h2>توضیحات</h2>
                    <p class="author">نویسنده: Arshan</p>
                    <p class="desc-text">اینجا متن توضیحات متوسط قرار می‌گیرد...</p>
                    <div class="social-buttons">
                        <button class="social-btn instagram">Instagram</button>
                        <button class="social-btn telegram">Telegram</button>
                        <button class="social-btn x">X</button>
                    </div>
                </div>
            </section>

            <!-- EXPLORE PAGE -->
            <section id="page-explore" class="page hidden">
                <div class="explore-box">
                    <h2>اکسپلور تاریخ</h2>
                    <p>این صفحه برای بررسی تاریخ‌ها و اطلاعات مرتبط قرار گرفته است.</p>
                </div>
            </section>
        </div>

    </div>

    <script src="script.js"></script>
</body>
</html>
